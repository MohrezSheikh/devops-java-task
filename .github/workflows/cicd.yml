name: Java CI/CD Pipeline

# When should this pipeline run? 
on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1: BUILD THE JAVA CODE
  build-java:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: ./mvnw clean package

    # Upload the built jar file so the next job can use it
    - name: Save Jar artifact
      uses: actions/upload-artifact@v4
      with:
        name: java-app
        path: target/*.jar

  # JOB 2: BUILD DOCKER & PUSH
  build-and-push-docker:
    needs: build-java # Wait for Job 1 to finish!
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Download the jar file we built in Job 1
    - name: Download Jar artifact
      uses: actions/download-artifact@v4
      with:
        name: java-app
        path: target/

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/devops-java-task:latest
